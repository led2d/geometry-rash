<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
        />
        <title>Geometry Dash Webport</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            html,
            body {
                height: 100%;
                overflow: hidden;
                background: #000;
                font-family: system-ui, sans-serif;
                color: #fff;
            }
            canvas {
                display: block;
                margin: 0 auto;
            }
            #selector {
                display: flex;
                flex-direction: column;
                height: 100%;
            }
            #title-bar {
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 6px 12px;
                background: #111;
                border-bottom: 1px solid #222;
            }
            #title-info {
                display: flex;
                align-items: center;
                gap: 8px;
                font-size: 15px;
            }
            #title-name {
                font-weight: 600;
            }
            #title-difficulty {
                height: 28px;
                width: auto;
                vertical-align: middle;
                image-rendering: pixelated;
            }
            #fullscreen-btn {
                padding: 3px 10px;
                font-size: 13px;
                background: #222;
                color: #aaa;
                border: 1px solid #444;
                border-radius: 4px;
                cursor: pointer;
            }
            #fullscreen-btn:hover {
                background: #333;
                color: #fff;
            }
            #game-frame {
                flex: 1;
                border: none;
                width: 100%;
            }
            #controls {
                display: flex;
                align-items: center;
                gap: 8px;
                padding: 6px 12px;
                background: #111;
                border-top: 1px solid #222;
            }
            #level-select {
                flex: 1;
                padding: 4px 8px;
                font-size: 14px;
                background: #222;
                color: #fff;
                border: 1px solid #444;
                border-radius: 4px;
            }
            #controls button {
                padding: 4px 12px;
                font-size: 14px;
                background: #333;
                color: #fff;
                border: 1px solid #555;
                border-radius: 4px;
                cursor: pointer;
            }
            #controls button:hover {
                background: #444;
            }
        </style>
    </head>
    <body>
        <script type="module" src="/src/main.tsx"></script>
    </body>
</html>
